<!DOCTYPE html>
<html>
<head>
  <title>AndOR Bridge Dashboard</title>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'SF Mono', 'Consolas', monospace; 
      background: #0d1117; 
      color: #c9d1d9; 
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    
    /* Header */
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      padding: 20px;
      background: #161b22;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid #30363d;
    }
    .header h1 { color: #58a6ff; font-size: 24px; }
    .status-badge {
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-badge.running { background: #238636; color: white; }
    .status-badge.processing { background: #f0883e; color: white; animation: pulse 0.5s infinite; }
    .status-badge.error { background: #da3633; color: white; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    
    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    
    /* Cards */
    .card {
      background: #161b22;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #30363d;
    }
    .card-title { 
      font-size: 12px; 
      text-transform: uppercase; 
      color: #8b949e; 
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    .card-value { 
      font-size: 32px; 
      font-weight: bold; 
      color: #58a6ff;
    }
    .card-value.error { color: #f85149; }
    .card-value.success { color: #3fb950; }
    
    /* Logs */
    .logs-card { grid-column: span 2; }
    @media (max-width: 768px) { .logs-card { grid-column: span 1; } }
    .logs {
      background: #0d1117;
      border-radius: 8px;
      padding: 12px;
      height: 300px;
      overflow-y: auto;
      font-size: 12px;
      border: 1px solid #30363d;
    }
    .log-entry { 
      padding: 4px 0;
      border-bottom: 1px solid #21262d;
      display: flex;
      gap: 8px;
    }
    .log-time { color: #6e7681; flex-shrink: 0; }
    .log-type { 
      padding: 2px 6px; 
      border-radius: 4px; 
      font-size: 10px; 
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .log-type.msg { background: #1f6feb; color: white; }
    .log-type.sent { background: #238636; color: white; }
    .log-type.error { background: #da3633; color: white; }
    .log-type.info { background: #30363d; color: #8b949e; }
    .log-content { color: #c9d1d9; word-break: break-all; }
    
    /* Config */
    .config-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      font-size: 13px;
    }
    .config-label { color: #8b949e; }
    .config-value { color: #58a6ff; font-family: monospace; }
    
    /* Activity Graph */
    .activity {
      display: flex;
      gap: 4px;
      height: 60px;
      align-items: flex-end;
    }
    .activity-bar {
      width: 8px;
      background: #238636;
      border-radius: 2px 2px 0 0;
      transition: height 0.3s;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🧩 AndOR Bridge</h1>
      <div id="statusBadge" class="status-badge running">
        <span id="statusIcon">●</span>
        <span id="statusText">Running</span>
      </div>
    </div>
    
    <!-- Stats Grid -->
    <div class="grid">
      <div class="card">
        <div class="card-title">Messages Received</div>
        <div class="card-value" id="msgReceived">0</div>
      </div>
      <div class="card">
        <div class="card-title">Messages Sent</div>
        <div class="card-value success" id="msgSent">0</div>
      </div>
      <div class="card">
        <div class="card-title">Errors</div>
        <div class="card-value error" id="errors">0</div>
      </div>
    </div>
    
    <!-- Logs & Config -->
    <div class="grid">
      <div class="card logs-card">
        <div class="card-title">Live Logs</div>
        <div class="logs" id="logs"></div>
      </div>
      <div class="card">
        <div class="card-title">Activity (last 30s)</div>
        <div class="activity" id="activity"></div>
        <div style="margin-top: 20px;">
          <div class="card-title">Configuration</div>
          <div class="config-item">
            <span class="config-label">OpenClaw</span>
            <span class="config-value">localhost:18789</span>
          </div>
          <div class="config-item">
            <span class="config-label">AndOR</span>
            <span class="config-value">aesir.tailb0b4db.ts.net:8080</span>
          </div>
          <div class="config-item">
            <span class="config-label">Webhook</span>
            <span class="config-value">:3456/webhook</span>
          </div>
          <div class="config-item">
            <span class="config-label">Uptime</span>
            <span class="config-value" id="uptime">0s</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // State
    let state = {
      started: null,
      messagesReceived: 0,
      messagesSent: 0,
      errors: 0,
      processing: false,
      logs: [],
      activity: Array(30).fill(0)
    };
    
    // Initialize
    fetch('/stats')
      .then(r => r.json())
      .then(data => {
        state.started = new Date(data.started);
        state.messagesReceived = data.messagesReceived;
        state.messagesSent = data.messagesSent;
        state.errors = data.errors;
        state.processing = data.processing;
        render();
      });
    
    // Poll for updates
    setInterval(() => {
      fetch('/stats')
        .then(r => r.json())
        .then(data => {
          // Check for new messages
          if (data.messagesReceived > state.messagesReceived) {
            addLog('msg', `New message received`);
            state.activity[state.activity.length - 1]++;
          }
          if (data.messagesSent > state.messagesSent) {
            addLog('sent', `Response sent`);
          }
          if (data.errors > state.errors) {
            addLog('error', data.lastError || 'Error occurred');
          }
          
          state.messagesReceived = data.messagesReceived;
          state.messagesSent = data.messagesSent;
          state.errors = data.errors;
          state.processing = data.processing;
          render();
        });
      
      // Shift activity graph
      state.activity.shift();
      state.activity.push(0);
      renderActivity();
    }, 1000);
    
    // Add log entry
    function addLog(type, content) {
      const now = new Date();
      const time = now.toLocaleTimeString();
      state.logs.unshift({ time, type, content });
      if (state.logs.length > 100) state.logs.pop();
      renderLogs();
    }
    
    // Render functions
    function render() {
      document.getElementById('msgReceived').textContent = state.messagesReceived;
      document.getElementById('msgSent').textContent = state.messagesSent;
      document.getElementById('errors').textContent = state.errors;
      
      // Status badge
      const badge = document.getElementById('statusBadge');
      const icon = document.getElementById('statusIcon');
      const text = document.getElementById('statusText');
      
      if (state.processing) {
        badge.className = 'status-badge processing';
        icon.textContent = '⚡';
        text.textContent = 'Processing...';
      } else if (state.errors > 0) {
        badge.className = 'status-badge running';
        icon.textContent = '●';
        text.textContent = 'Running';
      } else {
        badge.className = 'status-badge running';
        icon.textContent = '●';
        text.textContent = 'Running';
      }
      
      // Uptime
      if (state.started) {
        const uptime = Math.floor((Date.now() - state.started) / 1000);
        const mins = Math.floor(uptime / 60);
        const secs = uptime % 60;
        document.getElementById('uptime').textContent = 
          mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
      }
    }
    
    function renderLogs() {
      const container = document.getElementById('logs');
      container.innerHTML = state.logs.map(log => `
        <div class="log-entry">
          <span class="log-time">${log.time}</span>
          <span class="log-type ${log.type}">${log.type}</span>
          <span class="log-content">${log.content}</span>
        </div>
      `).join('');
    }
    
    function renderActivity() {
      const container = document.getElementById('activity');
      const max = Math.max(...state.activity, 1);
      container.innerHTML = state.activity.map(val => `
        <div class="activity-bar" style="height: ${Math.max(val / max * 60, 2)}px"></div>
      `).join('');
    }
    
    // Initial render
    renderActivity();
  </script>
</body>
</html>
