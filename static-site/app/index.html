<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Pen — Chat</title>
    <style>
        :root {
            /* Architectural drawing palette: 60% neutrals, 40% colour */
            --bg-primary: #f7f5f0;        /* Warm cream — paper */
            --bg-secondary: #efebe3;      /* Slightly darker cream — sidebar */
            --bg-tertiary: #e8e2d8;       /* Hover / secondary panels */
            --text-primary: #1a1a1a;      /* Dense charcoal — ink */
            --text-secondary: #5a5a5a;    /* Lighter grey — pencil */
            --text-tertiary: #8a8a8a;     /* Faint grey — construction lines */
            --border: #d4cdc0;            /* Warm grey — border line */
            --border-thick: #2d2d2d;      /* Dark — thick line weight */
            --accent-teal: #2a7f7f;       /* Muted teal — primary accent */
            --accent-rust: #b85c38;       /* Rust orange — secondary accent */
            --accent-cadmium: #d4a843;    /* Cadmium yellow — tertiary accent */
            --accent-surface: rgba(42, 127, 127, 0.08); /* Teal wash */
            --radius: 2px;                /* Sharp, architectural corners */
            --shadow: 0 1px 3px rgba(26, 26, 26, 0.06);
            --line-weight: 1.5px;         /* Thicker lines */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ─── Sidebar ─── */
        #sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: var(--line-weight) solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 100vh;
        }

        .sidebar-header {
            padding: 20px 24px;
            border-bottom: var(--line-weight) solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .sidebar-header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .sidebar-header h1 span {
            color: var(--accent-teal);
        }

        .new-chat-btn {
            width: calc(100% - 48px);
            margin: 16px 24px;
            padding: 10px 16px;
            background: var(--accent-teal);
            border: var(--line-weight) solid var(--accent-teal);
            border-radius: var(--radius);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .new-chat-btn:hover {
            background: transparent;
            color: var(--accent-teal);
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .conversation-item {
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.15s ease;
            border-left: 3px solid transparent;
        }

        .conversation-item:hover {
            background: var(--bg-tertiary);
        }

        .conversation-item.active {
            background: var(--accent-surface);
            border-left-color: var(--accent-teal);
        }

        .conversation-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-cadmium);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            border: var(--line-weight) solid rgba(0,0,0,0.1);
        }

        .conversation-info {
            flex: 1;
            min-width: 0;
        }

        .conversation-title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .conversation-meta {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .sidebar-footer {
            padding: 16px 24px;
            border-top: var(--line-weight) solid var(--border);
            font-size: 12px;
            color: var(--text-tertiary);
            flex-shrink: 0;
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-primary);
            border: var(--line-weight) solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .user-pill .avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent-rust);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: white;
        }

        /* ─── Main Chat Area ─── */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-primary);
        }

        .chat-header {
            padding: 16px 32px;
            border-bottom: var(--line-weight) solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            background: var(--bg-primary);
        }

        .chat-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chat-header .model-badge {
            padding: 4px 12px;
            background: var(--accent-surface);
            border: 1px solid var(--accent-teal);
            border-radius: var(--radius);
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-teal);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 14px;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            border: var(--line-weight) solid rgba(0,0,0,0.08);
        }

        .message.user .message-avatar {
            background: var(--accent-rust);
        }

        .message.assistant .message-avatar {
            background: var(--accent-teal);
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: var(--radius);
            border: var(--line-weight) solid var(--border);
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: var(--bg-secondary);
            border-color: var(--border);
        }

        .message.assistant .message-bubble {
            background: white;
            border-color: var(--border);
            box-shadow: var(--shadow);
        }

        .message-bubble pre {
            background: #f0ece4;
            padding: 12px 16px;
            border-radius: var(--radius);
            border-left: 3px solid var(--accent-cadmium);
            overflow-x: auto;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            margin: 8px 0;
        }

        .message-bubble code {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 13px;
            background: #f0ece4;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 4px;
            text-align: right;
        }

        /* ─── Input Area ─── */
        .input-area {
            padding: 20px 32px;
            border-top: var(--line-weight) solid var(--border);
            background: var(--bg-primary);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: white;
            border: var(--line-weight) solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            box-shadow: var(--shadow);
        }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.5;
            max-height: 200px;
            min-height: 24px;
            background: transparent;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-tertiary);
        }

        .send-btn {
            padding: 8px 20px;
            background: var(--accent-teal);
            border: var(--line-weight) solid var(--accent-teal);
            border-radius: var(--radius);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: transparent;
            color: var(--accent-teal);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ─── Login Modal ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 26, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: var(--bg-primary);
            border: var(--line-weight) solid var(--border-thick);
            border-radius: var(--radius);
            padding: 40px;
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        .modal h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .modal p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: var(--line-weight) solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: inherit;
            background: white;
            transition: border-color 0.15s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-teal);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent-teal);
            border: var(--line-weight) solid var(--accent-teal);
            border-radius: var(--radius);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-primary:hover {
            background: transparent;
            color: var(--accent-teal);
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: var(--line-weight) solid var(--border);
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            border-color: var(--accent-teal);
            color: var(--accent-teal);
        }

        /* ─── Empty State ─── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            text-align: center;
            padding: 40px;
        }

        .empty-state h2 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 400px;
        }

        /* ─── Loading Spinner ─── */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* ─── Hidden ─── */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Login Modal -->
    <div id="loginModal" class="modal-overlay">
        <div class="modal">
            <h2>Claw Pen</h2>
            <p>Sign in to start chatting</p>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter admin password" onkeypress="if(event.key==='Enter')doLogin()">
            </div>
            <button class="btn-primary" onclick="doLogin()">Sign In</button>
            <div id="loginError" style="color: var(--accent-rust); font-size: 13px; margin-top: 12px; text-align: center;"></div>
        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h1>Claw <span>Pen</span></h1>
        </div>
        <button class="new-chat-btn" onclick="createNewChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            New Chat
        </button>
        <div class="conversations-list" id="conversationsList"></div>
        <div class="sidebar-footer">
            <div class="user-pill">
                <div class="avatar" id="userAvatar">A</div>
                <span id="userName">Admin</span>
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div id="main">
        <div id="chatHeader" class="chat-header hidden">
            <h2 id="chatTitle">New Chat</h2>
            <span class="model-badge" id="modelBadge">kimi-k2.6</span>
        </div>
        <div id="emptyState" class="empty-state">
            <h2>Start a conversation</h2>
            <p>Click "New Chat" to begin, or select an existing conversation from the sidebar.</p>
        </div>
        <div id="messagesContainer" class="messages-container hidden"></div>
        <div id="inputArea" class="input-area hidden">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="Ask anything..." rows="1" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

<script>
const API_BASE = window.location.origin;
let token = localStorage.getItem('token') || '';
let currentConversation = null;
let isSending = false;

// Check auth on load
if (token) {
    document.getElementById('loginModal').classList.add('hidden');
    loadConversations();
    fetchUser();
} else {
    document.getElementById('loginModal').classList.remove('hidden');
}

async function doLogin() {
    const password = document.getElementById('loginPassword').value;
    if (!password) return;
    try {
        const res = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (res.ok && data.access_token) {
            token = data.access_token;
            localStorage.setItem('token', token);
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('loginError').textContent = '';
            loadConversations();
            fetchUser();
        } else {
            document.getElementById('loginError').textContent = data.error || 'Invalid password';
        }
    } catch (e) {
        document.getElementById('loginError').textContent = 'Connection failed';
    }
}

async function fetchUser() {
    try {
        const res = await fetch(`${API_BASE}/api/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
            const data = await res.json();
            document.getElementById('userName').textContent = data.username || 'User';
            document.getElementById('userAvatar').textContent = (data.username || 'U')[0].toUpperCase();
        }
    } catch (e) {}
}

async function loadConversations() {
    try {
        const res = await fetch(`${API_BASE}/api/conversations`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) return;
        const conversations = await res.json();
        const list = document.getElementById('conversationsList');
        list.innerHTML = '';
        conversations.forEach((conv, i) => {
            const div = document.createElement('div');
            div.className = 'conversation-item' + (conv.id === currentConversation ? ' active' : '');
            div.onclick = () => loadConversation(conv.id);
            div.innerHTML = `
                <div class="conversation-icon" style="background: ${['#2a7f7f','#b85c38','#d4a843','#5a7a5a','#8a6a8a'][i % 5]}">${conv.title[0]}</div>
                <div class="conversation-info">
                    <div class="conversation-title">${escapeHtml(conv.title)}</div>
                    <div class="conversation-meta">${conv.message_count} messages</div>
                </div>
            `;
            list.appendChild(div);
        });
    } catch (e) {}
}

async function createNewChat() {
    try {
        const res = await fetch(`${API_BASE}/api/conversations`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ title: 'New Chat' })
        });
        if (!res.ok) return;
        const conv = await res.json();
        currentConversation = conv.id;
        await loadConversations();
        showChat();
        document.getElementById('chatTitle').textContent = conv.title;
        document.getElementById('messagesContainer').innerHTML = '';
    } catch (e) {}
}

async function loadConversation(id) {
    currentConversation = id;
    try {
        const [convRes, msgRes] = await Promise.all([
            fetch(`${API_BASE}/api/conversations/${id}`, { headers: { 'Authorization': `Bearer ${token}` } }),
            fetch(`${API_BASE}/api/conversations/${id}/messages`, { headers: { 'Authorization': `Bearer ${token}` } })
        ]);
        if (!convRes.ok || !msgRes.ok) return;
        const conv = await convRes.json();
        const messages = await msgRes.json();
        document.getElementById('chatTitle').textContent = conv.title;
        showChat();
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        messages.forEach(msg => appendMessage(msg.role, msg.content));
        loadConversations();
    } catch (e) {}
}

function showChat() {
    document.getElementById('emptyState').classList.add('hidden');
    document.getElementById('chatHeader').classList.remove('hidden');
    document.getElementById('messagesContainer').classList.remove('hidden');
    document.getElementById('inputArea').classList.remove('hidden');
}

function appendMessage(role, content) {
    const container = document.getElementById('messagesContainer');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = role === 'user' ? 'U' : 'K';
    const color = role === 'user' ? 'var(--accent-rust)' : 'var(--accent-teal)';
    div.innerHTML = `
        <div class="message-avatar" style="background: ${color}">${avatar}</div>
        <div class="message-bubble">${formatContent(content)}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function formatContent(text) {
    // Escape HTML first
    text = escapeHtml(text);
    // Code blocks
    text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // Line breaks
    text = text.replace(/\n/g, '<br>');
    return text;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function sendMessage() {
    if (isSending || !currentConversation) return;
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content) return;

    input.value = '';
    input.rows = 1;
    appendMessage('user', content);
    isSending = true;
    document.getElementById('sendBtn').disabled = true;

    try {
        const res = await fetch(`${API_BASE}/api/conversations/${currentConversation}/messages`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ content, model: 'kimi-k2.6', provider: 'kimi' })
        });
        if (!res.ok) throw new Error('Failed');
        const data = await res.json();
        appendMessage('assistant', data.content || data.message || 'No response');
    } catch (e) {
        appendMessage('assistant', 'Error: Could not get response. Please check your API key.');
    } finally {
        isSending = false;
        document.getElementById('sendBtn').disabled = false;
    }
}

// Auto-resize textarea
const textarea = document.getElementById('messageInput');
textarea.addEventListener('input', function() {
    this.rows = 1;
    const rows = Math.ceil(this.scrollHeight / 24);
    this.rows = Math.min(rows, 10);
});
</script>
</body>
</html>
