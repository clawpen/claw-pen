<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Pen — Chat</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        :root {
            --bg-primary: #f7f5f0; --bg-secondary: #efebe3; --bg-tertiary: #e8e2d8;
            --text-primary: #1a1a1a; --text-secondary: #5a5a5a; --text-tertiary: #8a8a8a;
            --border: #d4cdc0; --border-thick: #2d2d2d;
            --accent-teal: #2a7f7f; --accent-rust: #b85c38; --accent-cadmium: #d4a843;
            --accent-surface: rgba(42, 127, 127, 0.08);
            --radius: 2px; --shadow: 0 1px 3px rgba(26, 26, 26, 0.06); --line-weight: 1.5px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 15px; line-height: 1.5; min-height: 100vh; display: flex; overflow: hidden; }

        /* Skeleton */
        @keyframes skeleton-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .skeleton { background: var(--border); border-radius: var(--radius); animation: skeleton-pulse 1.5s ease-in-out infinite; }
        .skeleton-text { height: 14px; margin-bottom: 8px; }
        .skeleton-title { height: 18px; width: 60%; margin-bottom: 12px; }
        .skeleton-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; }
        .skeleton-row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 16px; }
        .skeleton-bubble { flex: 1; height: 60px; border-radius: 8px; }

        /* Sidebar */
        #sidebar { width: 300px; background: var(--bg-secondary); border-right: var(--line-weight) solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; }
        .sidebar-header { padding: 20px 24px; border-bottom: var(--line-weight) solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .sidebar-header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-primary); }
        .sidebar-header h1 span { color: var(--accent-teal); }
        .new-chat-btn { width: calc(100% - 48px); margin: 16px 24px; padding: 10px 16px; background: var(--accent-teal); border: var(--line-weight) solid var(--accent-teal); border-radius: var(--radius); color: white; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .new-chat-btn:hover { background: #1f6b6b; }
        .conversations-list { flex: 1; overflow-y: auto; min-height: 0; padding: 0 12px; }
        .conversation-item { display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 4px; border-radius: var(--radius); cursor: pointer; transition: all 0.2s; position: relative; border: var(--line-weight) solid transparent; }
        .conversation-item:hover { background: var(--bg-tertiary); border-color: var(--border); }
        .conversation-item.active { background: var(--accent-surface); border-color: var(--accent-teal); }
        .conversation-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: 700; flex-shrink: 0; position: relative; }
        .color-picker { display: none; position: absolute; top: 100%; left: 0; flex-wrap: wrap; width: 72px; gap: 2px; padding: 4px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 4px; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .color-picker span { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; border: 1px solid var(--border); }
        .color-picker span:hover { transform: scale(1.2); }
        .conversation-info { flex: 1; min-width: 0; }
        .conversation-title { font-size: 14px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: text; }
        .conversation-meta { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
        .delete-btn { display: none; width: 24px; height: 24px; align-items: center; justify-content: center; background: transparent; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 16px; border-radius: 4px; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); }
        .conversation-item:hover .delete-btn { display: flex; }
        .delete-btn:hover { background: var(--accent-rust); color: white; }

        /* Main Chat */
        #main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100vh; }
        .chat-header { padding: 16px 24px; border-bottom: var(--line-weight) solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--bg-primary); }
        .chat-header h2 { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .prompt-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--accent-surface); border: var(--line-weight) solid var(--accent-teal); border-radius: var(--radius); font-size: 12px; color: var(--accent-teal); cursor: pointer; }
        .messages-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
        .message { display: flex; gap: 12px; align-items: flex-start; max-width: 80%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.system { align-self: center; }
        .message-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: 700; flex-shrink: 0; }
        .message-bubble { padding: 12px 16px; border-radius: 8px; border: var(--line-weight) solid var(--border); background: white; font-size: 15px; line-height: 1.5; }
        .message.user .message-bubble { background: var(--accent-teal); color: white; border-color: var(--accent-teal); }
        .message.assistant .message-bubble { background: white; color: var(--text-primary); }
        .message.system .message-bubble { background: var(--accent-cadmium); color: var(--text-primary); font-style: italic; font-size: 14px; border: var(--line-weight) dashed var(--accent-cadmium); text-align: center; }

        /* Code Execution */
        .code-block { position: relative; margin: 8px 0; }
        .code-block pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 6px; overflow-x: auto; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.4; border: 1px solid #333; }
        .code-block .run-btn { position: absolute; top: 6px; right: 6px; padding: 4px 10px; font-size: 12px; background: var(--accent-teal); color: white; border: none; border-radius: 4px; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
        .code-block:hover .run-btn { opacity: 1; }
        .code-block .run-btn:hover { background: #1f6b6b; }
        .code-block .run-btn:disabled { background: var(--text-tertiary); cursor: not-allowed; }
        .code-output { margin-top: 4px; padding: 8px 12px; background: #f0f0f0; border: 1px solid var(--border); border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 13px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .code-output.error { color: var(--accent-rust); border-color: var(--accent-rust); background: #fff5f0; }
        .code-output img { max-width: 100%; border-radius: 4px; }

        /* Load More */
        .load-more-btn { display: flex; align-items: center; justify-content: center; padding: 8px; margin: 8px 0; background: transparent; color: var(--text-secondary); border: var(--line-weight) dashed var(--border); border-radius: var(--radius); cursor: pointer; font-size: 13px; width: 100%; transition: all 0.2s; }
        .load-more-btn:hover { background: var(--accent-surface); color: var(--accent-teal); border-color: var(--accent-teal); }

        /* Replying Indicator */
        .replying-indicator { align-self: flex-start; display: flex; align-items: center; gap: 12px; max-width: 80%; }
        .replying-indicator .message-bubble { display: flex; align-items: center; gap: 10px; background: var(--bg-secondary); }
        .dots { display: flex; gap: 4px; }
        .dots span { width: 6px; height: 6px; background: var(--accent-teal); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dots span:nth-child(1) { animation-delay: -0.32s; }
        .dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .replying-indicator .text { font-size: 14px; color: var(--text-secondary); font-style: italic; }

        /* Input */
        .input-area { padding: 16px 24px; border-top: var(--line-weight) solid var(--border); display: flex; gap: 12px; flex-shrink: 0; background: var(--bg-primary); }
        .message-input { flex: 1; padding: 12px 16px; border: var(--line-weight) solid var(--border); border-radius: 8px; font-size: 15px; resize: none; font-family: inherit; background: white; outline: none; }
        .message-input:focus { border-color: var(--accent-teal); }
        .send-btn { padding: 12px 20px; background: var(--accent-teal); border: var(--line-weight) solid var(--accent-teal); border-radius: 8px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .send-btn:hover { background: #1f6b6b; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Empty State */
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--text-tertiary); }
        .empty-state h3 { font-size: 18px; font-weight: 600; color: var(--text-secondary); }

        /* Login Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(26, 26, 26, 0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: var(--bg-primary); border: var(--line-weight) solid var(--border-thick); border-radius: var(--radius); padding: 32px; width: 400px; max-width: 90vw; }
        .modal h2 { font-size: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: var(--line-weight) solid var(--border); border-radius: var(--radius); font-size: 14px; background: white; outline: none; }
        .form-group input:focus { border-color: var(--accent-teal); }
        .tabs { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: var(--line-weight) solid var(--border); }
        .tab { padding: 8px 0; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-tertiary); border-bottom: 2px solid transparent; margin-bottom: -1.5px; }
        .tab:hover { color: var(--text-primary); }
        .btn { padding: 10px 16px; background: var(--accent-teal); border: var(--line-weight) solid var(--accent-teal); border-radius: var(--radius); color: white; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn:hover { background: #1f6b6b; }
        .error { color: var(--accent-rust); font-size: 13px; margin-top: 8px; }
        .success { color: #5a7a5a; font-size: 13px; margin-top: 8px; }
        .hidden { display: none !important; }

        /* Admin Dashboard */
        .admin-modal { position: fixed; inset: 0; background: var(--bg-primary); z-index: 50; display: flex; flex-direction: column; }
        .admin-header { padding: 16px 24px; border-bottom: var(--line-weight) solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .admin-tabs { display: flex; gap: 4px; padding: 0 24px; border-bottom: var(--line-weight) solid var(--border); overflow-x: auto; }
        .admin-tab { padding: 10px 16px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-tertiary); border-bottom: 2px solid transparent; white-space: nowrap; }
        .admin-tab:hover { color: var(--text-primary); }
        .admin-tab.active { color: var(--accent-teal); border-bottom-color: var(--accent-teal); }
        .admin-content { flex: 1; overflow-y: auto; padding: 24px; }
        .user-card { border: var(--line-weight) solid var(--border); padding: 16px; margin-bottom: 12px; border-radius: var(--radius); }
        .user-card h4 { font-size: 15px; margin-bottom: 4px; }
        .user-card p { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .action-btn { padding: 6px 12px; font-size: 13px; border: var(--line-weight) solid var(--border); border-radius: var(--radius); cursor: pointer; background: white; margin-right: 8px; }
        .action-btn.approve { border-color: var(--accent-teal); color: var(--accent-teal); }
        .action-btn.reject { border-color: var(--accent-rust); color: var(--accent-rust); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h1>Claw<span>Pen</span></h1>
            <button id="adminBtn" class="action-btn" style="display:none">Admin</button>
        </div>
        <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
        <div class="conversations-list" id="conversationsList"></div>
    </div>

    <div id="main">
        <div class="chat-header" id="chatHeader">
            <h2 id="chatTitle">Select a chat</h2>
            <span class="prompt-badge" id="promptBadge" onclick="showPromptModal()">Default</span>
        </div>
        <div class="empty-state" id="emptyState">
            <h3>Welcome to Claw Pen</h3>
            <p>Select a conversation or start a new chat</p>
        </div>
        <div class="messages-container hidden" id="messagesContainer"></div>
        <div class="input-area hidden" id="inputArea">
            <textarea class="message-input" id="messageInput" rows="1" placeholder="Type a message... (use ```python for code)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <div class="tabs">
                <span class="tab" id="tabLogin" onclick="switchTab('login')">Login</span>
                <span class="tab" id="tabRegister" onclick="switchTab('register')">Register</span>
            </div>
            <div id="loginForm">
                <div class="form-group"><label>Username</label><input id="loginUsername" placeholder="username"></div>
                <div class="form-group"><label>Password</label><input id="loginPassword" type="password" placeholder="password"></div>
                <div class="form-group"><label>Secret Word</label><input id="loginSecret" placeholder="secret word"></div>
                <button class="btn" onclick="doLogin()">Login</button>
            </div>
            <div id="registerForm" class="hidden">
                <div class="form-group"><label>Username</label><input id="regUsername" placeholder="username"></div>
                <div class="form-group"><label>Display Name</label><input id="regDisplayName" placeholder="Your name"></div>
                <div class="form-group"><label>Password</label><input id="regPassword" type="password" placeholder="min 8 chars"></div>
                <div class="form-group"><label>Secret Word</label><input id="regSecret" placeholder="secret word"></div>
                <button class="btn" onclick="doRegister()">Register</button>
            </div>
            <div class="error" id="loginError"></div>
            <div class="success" id="loginSuccess"></div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="promptModal">
        <div class="modal">
            <h2>System Prompt</h2>
            <div class="form-group"><textarea id="promptInput" rows="6" placeholder="Enter system prompt..."></textarea></div>
            <button class="btn" onclick="savePrompt()">Save</button>
            <button class="btn" style="background:var(--bg-tertiary);color:var(--text-primary);border-color:var(--border);margin-top:8px" onclick="document.getElementById('promptModal').classList.add('hidden')">Cancel</button>
        </div>
    </div>

    <div class="admin-modal hidden" id="adminDashboardModal">
        <div class="admin-header">
            <h2>Admin Dashboard</h2>
            <button class="action-btn" onclick="closeAdminDashboard()">Close</button>
        </div>
        <div class="admin-tabs">
            <span class="admin-tab" id="adminTabPending" onclick="switchAdminTab('pending')">Pending</span>
            <span class="admin-tab" id="adminTabAll" onclick="switchAdminTab('all')">All Users</span>
            <span class="admin-tab" id="adminTabGrid" onclick="switchAdminTab('grid')">Grid</span>
            <span class="admin-tab" id="adminTabChats" onclick="switchAdminTab('chats')">User Chats</span>
            <span class="admin-tab" id="adminTabPrompts" onclick="switchAdminTab('prompts')">System Prompts</span>
            <span class="admin-tab" id="adminTabRoadmaps" onclick="switchAdminTab('roadmaps')">Roadmaps</span>
            <span class="admin-tab" id="adminTabMetrics" onclick="switchAdminTab('metrics')">Metrics</span>
        </div>
        <div class="admin-content" id="adminPending"></div>
        <div class="admin-content hidden" id="adminAllUsers"></div>
        <div class="admin-content hidden" id="adminGrid"></div>
        <div class="admin-content hidden" id="adminUserChats"></div>
        <div class="admin-content hidden" id="adminChatView" style="display:flex;flex-direction:column;max-height:70vh;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:var(--line-weight) solid var(--border);">
                <button class="action-btn" onclick="backToUserChats()">← Back to Users</button>
                <h3 id="adminChatViewTitle" style="font-size:16px;font-weight:600;">Conversation</h3>
                <span id="adminChatViewMeta" style="font-size:13px;color:var(--text-tertiary);"></span>
            </div>
            <div id="adminMessagesContainer" style="border:var(--line-weight) solid var(--border);border-radius:var(--radius);padding:16px;flex:1;overflow-y:auto;background:var(--bg-primary);display:flex;flex-direction:column;gap:16px;"></div>
        </div>
        <div class="admin-content hidden" id="adminPrompts"></div>
        <div class="admin-content hidden" id="adminRoadmaps"></div>
        <div class="admin-content hidden" id="adminMetrics"></div>
    </div>

<script>
const API_BASE = '';
let token = localStorage.getItem('token');
let currentConversation = null;
let isSending = false;
let isAdmin = false;
let pyodide = null;
let pyodideLoading = false;
let currentAdminTab = 'pending';
let messageOffset = 0;
let hasMoreMessages = false;
const MESSAGE_PAGE_SIZE = 50;

// ─── Pyodide ───
async function initPyodide() {
    if (pyodide || pyodideLoading) return;
    pyodideLoading = true;
    try {
        pyodide = await loadPyodide();
        await pyodide.loadPackage('matplotlib');
        await pyodide.loadPackage('numpy');
    } catch (e) { console.error('Pyodide failed:', e); }
    pyodideLoading = false;
}

async function runPython(code, outputId) {
    const outputEl = document.getElementById(outputId);
    if (!outputEl) return;
    if (!pyodide) { outputEl.textContent = 'Loading Python runtime...'; await initPyodide(); }
    if (!pyodide) { outputEl.textContent = 'Failed to load Python.'; outputEl.classList.add('error'); return; }
    outputEl.textContent = 'Running...';
    outputEl.classList.remove('error');
    try {
        pyodide.setStdout({ batched: (s) => { outputEl.textContent += s; } });
        pyodide.setStderr({ batched: (s) => { outputEl.textContent += s; outputEl.classList.add('error'); } });
        await pyodide.loadPackagesFromImports(code);
        const result = await pyodide.runPythonAsync(code);
        if (result !== undefined && outputEl.textContent === 'Running...') {
            outputEl.textContent = String(result);
        } else if (result !== undefined) {
            outputEl.textContent += '\n' + String(result);
        }
        if (outputEl.textContent === 'Running...') outputEl.textContent = '(no output)';
    } catch (e) {
        outputEl.textContent = e.message;
        outputEl.classList.add('error');
    }
}

// ─── Auth ───
if (!token) { document.getElementById('loginModal').classList.remove('hidden'); }
else { fetchUser(); loadConversations(); }

async function doLogin() {
    const u = document.getElementById('loginUsername').value;
    const p = document.getElementById('loginPassword').value;
    const s = document.getElementById('loginSecret').value;
    try {
        const res = await fetch(`${API_BASE}/auth/token`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p, secret_word: s }) });
        const data = await res.json();
        if (res.ok) { token = data.access_token; localStorage.setItem('token', token); document.getElementById('loginModal').classList.add('hidden'); fetchUser(); loadConversations(); }
        else { document.getElementById('loginError').textContent = data.error || 'Login failed'; }
    } catch (e) { document.getElementById('loginError').textContent = 'Connection failed'; }
}

async function doRegister() {
    const u = document.getElementById('regUsername').value;
    const p = document.getElementById('regPassword').value;
    const s = document.getElementById('regSecret').value;
    const d = document.getElementById('regDisplayName').value;
    if (p.length < 8) { document.getElementById('loginError').textContent = 'Password must be at least 8 characters'; return; }
    try {
        const res = await fetch(`${API_BASE}/auth/user/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p, display_name: d || null, secret_word: s }) });
        const data = await res.json();
        if (res.ok) { document.getElementById('loginSuccess').textContent = 'Registration successful! Please wait for admin approval.'; setTimeout(() => switchTab('login'), 2000); }
        else { document.getElementById('loginError').textContent = data.error || 'Registration failed'; }
    } catch (e) { document.getElementById('loginError').textContent = 'Connection failed'; }
}

function switchTab(tab) {
    document.getElementById('loginError').textContent = '';
    document.getElementById('loginSuccess').textContent = '';
    if (tab === 'login') { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('registerForm').classList.add('hidden'); document.getElementById('tabLogin').style.borderBottom = '2px solid var(--accent-teal)'; document.getElementById('tabLogin').style.color = 'var(--text-primary)'; document.getElementById('tabRegister').style.borderBottom = 'none'; document.getElementById('tabRegister').style.color = 'var(--text-tertiary)'; }
    else { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); document.getElementById('tabRegister').style.borderBottom = '2px solid var(--accent-teal)'; document.getElementById('tabRegister').style.color = 'var(--text-primary)'; document.getElementById('tabLogin').style.borderBottom = 'none'; document.getElementById('tabLogin').style.color = 'var(--text-tertiary)'; }
}

function doLogout() { token = null; localStorage.removeItem('token'); currentConversation = null; location.reload(); }

async function fetchUser() {
    if (!token) return;
    try {
        const res = await fetch(`${API_BASE}/api/me`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) { if (res.status === 401) doLogout(); return; }
        const data = await res.json();
        isAdmin = data.role === 'admin' || data.role === 'teacher';
        if (isAdmin) document.getElementById('adminBtn').style.display = 'block';
    } catch (e) {}
}

// ─── Conversations ───
async function loadConversations() {
    if (!token) return;
    const list = document.getElementById('conversationsList');
    // Show skeleton while loading
    if (list.children.length === 0) {
        list.innerHTML = Array(5).fill(0).map(() => `
            <div class="skeleton-row">
                <div class="skeleton skeleton-avatar"></div>
                <div style="flex:1">
                    <div class="skeleton skeleton-title"></div>
                    <div class="skeleton skeleton-text" style="width:40%"></div>
                </div>
            </div>
        `).join('');
    }
    try {
        const res = await fetch(`${API_BASE}/api/conversations`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) { if (res.status === 401) doLogout(); return; }
        const data = await res.json();
        const conversations = Array.isArray(data) ? data : (data.conversations || []);
        list.innerHTML = '';
        conversations.forEach((conv, i) => {
            const div = document.createElement('div');
            div.className = 'conversation-item' + (conv.id === currentConversation ? ' active' : '');
            div.dataset.id = conv.id;
            div.onclick = (e) => { if (e.target.closest('.color-picker, .title-input, .delete-btn')) return; loadConversation(conv.id); };
            const color = conv.color || ['#2a7f7f','#b85c38','#d4a843','#5a7a5a','#8a6a8a'][i % 5];
            div.innerHTML = `
                <div class="conversation-icon" style="background: ${color}; position: relative;">${(conv.title || 'C')[0]}
                    <div class="color-picker">
                        <span data-color="#2a7f7f" style="background:#2a7f7f"></span>
                        <span data-color="#b85c38" style="background:#b85c38"></span>
                        <span data-color="#d4a843" style="background:#d4a843"></span>
                        <span data-color="#5a7a5a" style="background:#5a7a5a"></span>
                        <span data-color="#8a6a8a" style="background:#8a6a8a"></span>
                        <span data-color="#3a6a9a" style="background:#3a6a9a"></span>
                        <span data-color="#9a5a5a" style="background:#9a5a5a"></span>
                        <span data-color="#6a8a5a" style="background:#6a8a5a"></span>
                    </div>
                </div>
                <div class="conversation-info">
                    <div class="conversation-title" title="Click to rename">${escapeHtml(conv.title || 'Untitled')}</div>
                    <div class="conversation-meta">${conv.message_count || 0} messages</div>
                </div>
                <button class="delete-btn" title="Delete conversation">×</button>
            `;
            const iconDiv = div.querySelector('.conversation-icon');
            const picker = div.querySelector('.color-picker');
            iconDiv.addEventListener('mouseenter', () => { picker.style.display = 'flex'; });
            iconDiv.addEventListener('mouseleave', () => { picker.style.display = 'none'; });
            picker.querySelectorAll('span').forEach(span => {
                span.onclick = (e) => { e.stopPropagation(); updateConversationColor(conv.id, span.dataset.color); iconDiv.style.background = span.dataset.color; };
            });
            const titleDiv = div.querySelector('.conversation-title');
            titleDiv.onclick = (e) => {
                e.stopPropagation();
                const input = document.createElement('input');
                input.className = 'title-input';
                input.value = conv.title || 'Untitled';
                input.style.cssText = 'font-size:13px;font-weight:600;color:var(--text-primary);background:transparent;border:none;border-bottom:1px solid var(--accent-teal);outline:none;width:100%;padding:0;';
                titleDiv.replaceWith(input);
                input.focus(); input.select();
                const save = () => {
                    const newTitle = input.value.trim() || conv.title || 'Untitled';
                    updateConversationTitle(conv.id, newTitle);
                    input.replaceWith(titleDiv);
                    titleDiv.textContent = newTitle;
                    conv.title = newTitle;
                };
                input.onblur = save;
                input.onkeydown = (e2) => { if (e2.key === 'Enter') { e2.preventDefault(); input.blur(); } };
            };
            div.querySelector('.delete-btn').onclick = (e) => { e.stopPropagation(); deleteConversation(conv.id, conv.title); };
            list.appendChild(div);
        });
    } catch (e) {}
}

async function updateConversationTitle(id, title) {
    if (!token) return;
    try { await fetch(`${API_BASE}/api/conversations/${id}`, { method: 'PATCH', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ title }) }); } catch (e) {}
}

async function updateConversationColor(id, color) {
    if (!token) return;
    try { await fetch(`${API_BASE}/api/conversations/${id}`, { method: 'PATCH', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ color }) }); } catch (e) {}
}

async function createNewChat() {
    if (!token) { document.getElementById('loginModal').classList.remove('hidden'); return; }
    try {
        const res = await fetch(`${API_BASE}/api/conversations`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ title: 'New Chat' }) });
        if (!res.ok) { if (res.status === 401) doLogout(); return; }
        const conv = await res.json();
        currentConversation = conv.id;
        loadConversation(conv.id);
        loadConversations();
    } catch (e) {}
}

async function loadConversation(id, append = false) {
    if (!token) return;
    if (!append) { currentConversation = id; messageOffset = 0; hasMoreMessages = true; }
    try {
        const [convRes, msgRes] = await Promise.all([
            fetch(`${API_BASE}/api/conversations/${id}`, { headers: { 'Authorization': `Bearer ${token}` } }),
            fetch(`${API_BASE}/api/conversations/${id}/messages?limit=${MESSAGE_PAGE_SIZE}&offset=${messageOffset}`, { headers: { 'Authorization': `Bearer ${token}` } })
        ]);
        if (!convRes.ok || !msgRes.ok) { if (convRes.status === 401 || msgRes.status === 401) doLogout(); return; }
        const conv = await convRes.json();
        const msgData = await msgRes.json();
        const messages = Array.isArray(msgData) ? msgData : (msgData.messages || []);
        hasMoreMessages = messages.length === MESSAGE_PAGE_SIZE;
        document.getElementById('chatTitle').textContent = conv.title || 'Chat';
        updatePromptBadge(conv.system_prompt || 'Default');
        showChat();
        const container = document.getElementById('messagesContainer');
        if (!append) { container.innerHTML = ''; }
        // Prepend messages (oldest first, so prepend to top)
        const fragment = document.createDocumentFragment();
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.role}`;
            div.id = `msg-${msg.id}`;
            div.innerHTML = formatMessageHTML(msg.role, msg.content);
            fragment.appendChild(div);
        });
        if (append && container.firstChild) {
            container.insertBefore(fragment, container.firstChild);
        } else {
            container.appendChild(fragment);
        }
        // Add load more button if needed
        const existingBtn = document.getElementById('loadMoreBtn');
        if (existingBtn) existingBtn.remove();
        if (hasMoreMessages && messageOffset > 0) {
            const btn = document.createElement('button');
            btn.id = 'loadMoreBtn';
            btn.className = 'load-more-btn';
            btn.textContent = 'Load older messages';
            btn.onclick = () => loadMoreMessages(id);
            container.insertBefore(btn, container.firstChild);
        }
        if (!append) { container.scrollTop = container.scrollHeight; }
        loadConversations();
    } catch (e) {}
}

async function loadMoreMessages(id) {
    messageOffset += MESSAGE_PAGE_SIZE;
    await loadConversation(id, true);
}

async function deleteConversation(id, title) {
    if (!confirm(`Delete "${title || 'this conversation'}"? This cannot be undone.`)) return;
    try {
        const res = await fetch(`${API_BASE}/api/conversations/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) { if (res.status === 401) doLogout(); return; }
        if (currentConversation === id) { currentConversation = null; document.getElementById('messagesContainer').innerHTML = ''; document.getElementById('chatTitle').textContent = 'Select a chat'; document.getElementById('emptyState').classList.remove('hidden'); document.getElementById('chatHeader').classList.add('hidden'); document.getElementById('messagesContainer').classList.add('hidden'); document.getElementById('inputArea').classList.add('hidden'); }
        loadConversations();
    } catch (e) {}
}

function showChat() {
    document.getElementById('emptyState').classList.add('hidden');
    document.getElementById('chatHeader').classList.remove('hidden');
    document.getElementById('messagesContainer').classList.remove('hidden');
    document.getElementById('inputArea').classList.remove('hidden');
}

function updatePromptBadge(text) {
    const badge = document.getElementById('promptBadge');
    badge.textContent = text.length > 20 ? text.slice(0, 20) + '...' : text;
    badge.title = text;
}

function showPromptModal() {
    if (!currentConversation) return;
    document.getElementById('promptInput').value = document.getElementById('promptBadge').title || '';
    document.getElementById('promptModal').classList.remove('hidden');
}

async function savePrompt() {
    if (!currentConversation) return;
    const prompt = document.getElementById('promptInput').value.trim();
    document.getElementById('promptModal').classList.add('hidden');
    updatePromptBadge(prompt || 'Default');
}

// ─── Messages ───
function formatMessageHTML(role, content) {
    let avatar, color;
    if (role === 'user') { avatar = 'U'; color = 'var(--accent-rust)'; }
    else if (role === 'system') { avatar = 'S'; color = 'var(--accent-cadmium)'; }
    else { avatar = 'K'; color = 'var(--accent-teal)'; }
    return `
        <div class="message-avatar" style="background: ${color}">${avatar}</div>
        <div class="message-bubble">${formatContent(content)}</div>
    `;
}

function appendMessage(role, content, id) {
    const container = document.getElementById('messagesContainer');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (id) div.id = `msg-${id}`;
    div.innerHTML = formatMessageHTML(role, content);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

function updateMessage(id, content) {
    const div = document.getElementById(`msg-${id}`);
    if (div) {
        const bubble = div.querySelector('.message-bubble');
        if (bubble) bubble.innerHTML = formatContent(content);
    }
}

function showReplying() {
    const container = document.getElementById('messagesContainer');
    if (document.getElementById('replying-indicator')) return;
    const div = document.createElement('div');
    div.id = 'replying-indicator';
    div.className = 'replying-indicator';
    div.innerHTML = `
        <div class="message-avatar" style="background: var(--accent-teal)">K</div>
        <div class="message-bubble">
            <div class="dots"><span></span><span></span><span></span></div>
            <span class="text">Thinking...</span>
        </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function hideReplying() {
    const el = document.getElementById('replying-indicator');
    if (el) el.remove();
}

function formatContent(text) {
    text = escapeHtml(text);
    // Python code blocks with run button
    text = text.replace(/```python\n([\s\S]*?)```/g, (match, code) => {
        const id = 'py-' + Math.random().toString(36).substr(2, 9);
        return `<div class="code-block">
            <button class="run-btn" onclick="runPython(\`${escapeHtml(code).replace(/\\/g, '\\\\').replace(/`/g, '\\`')}\`, '${id}')">▶ Run</button>
            <pre><code>${escapeHtml(code)}</code></pre>
            <div class="code-output" id="${id}"></div>
        </div>`;
    });
    // Other code blocks
    text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\n/g, '<br>');
    return text;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function sendMessage() {
    if (isSending || !currentConversation) return;
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content) return;

    // Handle /compact command
    if (content.toLowerCase() === '/compact') {
        input.value = ''; input.rows = 1;
        isSending = true;
        document.getElementById('sendBtn').disabled = true;
        input.disabled = true;
        showReplying();
        try {
            const res = await fetch(`${API_BASE}/api/conversations/${currentConversation}/compact`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } });
            if (!res.ok) throw new Error('Failed');
            const data = await res.json();
            hideReplying();
            appendMessage('system', data.content || 'Conversation compacted.');
            loadConversation(currentConversation);
            loadConversations();
        } catch (e) { hideReplying(); appendMessage('assistant', 'Error: Could not compact conversation.'); }
        finally { isSending = false; document.getElementById('sendBtn').disabled = false; input.disabled = false; input.focus(); }
        return;
    }

    // Optimistic: show user message immediately
    const tempId = 'temp-' + Date.now();
    input.value = ''; input.rows = 1;
    appendMessage('user', content, tempId);
    isSending = true;
    document.getElementById('sendBtn').disabled = true;
    input.disabled = true;
    showReplying();

    try {
        const res = await fetch(`${API_BASE}/api/conversations/${currentConversation}/messages`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ content, model: 'kimi-k2.6', provider: 'kimi' }) });
        if (!res.ok) throw new Error('Failed');
        const data = await res.json();
        hideReplying();
        const replyContent = data.message && data.message.content ? data.message.content : (data.content || 'No response');
        appendMessage('assistant', replyContent);
    } catch (e) {
        hideReplying();
        appendMessage('assistant', 'Error: Could not get response. Please check your API key configuration.');
    } finally {
        isSending = false;
        document.getElementById('sendBtn').disabled = false;
        input.disabled = false;
        input.focus();
    }
}

const textarea = document.getElementById('messageInput');
textarea.addEventListener('input', function() { this.rows = 1; const rows = Math.ceil(this.scrollHeight / 24); this.rows = Math.min(rows, 10); });

// ─── Admin Dashboard ───
function showAdminDashboard() { document.getElementById('adminDashboardModal').classList.remove('hidden'); switchAdminTab('pending'); }
function closeAdminDashboard() { document.getElementById('adminDashboardModal').classList.add('hidden'); }
function switchAdminTab(tab) {
    currentAdminTab = tab;
    const tabMap = { pending: 'adminPending', all: 'adminAllUsers', grid: 'adminGrid', chats: 'adminUserChats', prompts: 'adminPrompts', roadmaps: 'adminRoadmaps', metrics: 'adminMetrics' };
    const tabIds = ['pending', 'all', 'grid', 'chats', 'prompts', 'roadmaps', 'metrics'];
    tabIds.forEach(t => {
        const btn = document.getElementById('adminTab' + t.charAt(0).toUpperCase() + t.slice(1));
        const content = document.getElementById(tabMap[t]);
        if (btn) btn.classList.toggle('active', t === tab);
        if (content) content.classList.toggle('hidden', t !== tab);
    });
    // Always hide the chat view sub-panel when switching main tabs
    document.getElementById('adminChatView').classList.add('hidden');
    if (tab === 'pending') loadAdminPending();
    if (tab === 'all') loadAdminUsers();
    if (tab === 'grid') loadAdminGrid();
    if (tab === 'chats') loadAdminUserChats();
    if (tab === 'prompts') loadAdminSystemPrompts();
    if (tab === 'roadmaps') loadRoadmaps();
    if (tab === 'metrics') loadMetrics();
}

async function loadAdminPending() {
    try {
        const res = await fetch(`${API_BASE}/api/admin/users/pending`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        const container = document.getElementById('adminPending');
        if (!data.users || data.users.length === 0) { container.innerHTML = '<p style="color:var(--text-tertiary)">No pending approvals</p>'; return; }
        container.innerHTML = data.users.map(u => `
            <div class="user-card">
                <h4>${escapeHtml(u.display_name || u.username)}</h4>
                <p>@${escapeHtml(u.username)} • ${u.role}</p>
                <button class="action-btn approve" onclick="approveUser('${u.id}')">Approve</button>
                <button class="action-btn reject" onclick="rejectUser('${u.id}')">Reject</button>
            </div>
        `).join('');
    } catch (e) { document.getElementById('adminPending').innerHTML = '<p class="error">Failed to load</p>'; }
}

async function loadAdminUsers() {
    try {
        const res = await fetch(`${API_BASE}/api/admin/users`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        const container = document.getElementById('adminAllUsers');
        if (!data.users || data.users.length === 0) { container.innerHTML = '<p style="color:var(--text-tertiary)">No users</p>'; return; }
        container.innerHTML = data.users.map(u => `
            <div class="user-card">
                <h4>${escapeHtml(u.display_name || u.username)}</h4>
                <p>@${escapeHtml(u.username)} • ${u.role} • ${u.status}</p>
            </div>
        `).join('');
    } catch (e) { document.getElementById('adminAllUsers').innerHTML = '<p class="error">Failed to load</p>'; }
}

async function loadAdminGrid() {
    try {
        const res = await fetch(`${API_BASE}/api/admin/users`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        const container = document.getElementById('adminGrid');
        if (!data.users || data.users.length === 0) { container.innerHTML = '<p style="color:var(--text-tertiary)">No users</p>'; return; }
        container.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">' + data.users.map(u => `
            <div class="user-card" style="border-left:4px solid ${u.status === 'active' ? 'var(--accent-teal)' : 'var(--accent-cadmium)'};">
                <h4>${escapeHtml(u.display_name || u.username)}</h4>
                <p>@${escapeHtml(u.username)}</p>
                <p style="font-size:12px">${u.role} • ${u.status}</p>
                ${u.status === 'pending' ? `<button class="action-btn approve" onclick="approveUser('${u.id}')">Approve</button>` : ''}
            </div>
        `).join('') + '</div>';
    } catch (e) { document.getElementById('adminGrid').innerHTML = '<p class="error">Failed to load</p>'; }
}

async function approveUser(id) {
    try { await fetch(`${API_BASE}/api/admin/users/${id}/approve`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); loadAdminPending(); if (currentAdminTab === 'all') loadAdminUsers(); if (currentAdminTab === 'grid') loadAdminGrid(); } catch (e) {}
}

async function rejectUser(id) {
    try { await fetch(`${API_BASE}/api/admin/users/${id}/reject`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); loadAdminPending(); } catch (e) {}
}

async function loadAdminUserChats() {
    try {
        const res = await fetch(`${API_BASE}/api/admin/users`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        const container = document.getElementById('adminUserChats');
        if (!data.users || data.users.length === 0) { container.innerHTML = '<p style="color:var(--text-tertiary)">No users</p>'; return; }
        container.innerHTML = data.users.map(u => `
            <div class="user-card" onclick="loadUserChats('${u.id}')" style="cursor:pointer;">
                <h4>${escapeHtml(u.display_name || u.username)}</h4>
                <p>@${escapeHtml(u.username)} • Click to view chats</p>
            </div>
        `).join('');
    } catch (e) { document.getElementById('adminUserChats').innerHTML = '<p class="error">Failed to load</p>'; }
}

async function loadUserChats(userId) {
    try {
        const res = await fetch(`${API_BASE}/api/admin/users/${userId}/conversations`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        const container = document.getElementById('adminUserChats');
        if (!data.conversations || data.conversations.length === 0) {
            container.innerHTML = '<p style="color:var(--text-tertiary)">No conversations found for this user.</p>';
            return;
        }
        container.innerHTML = '<h3 style="margin-bottom:12px;font-size:16px;">Conversations</h3>' + data.conversations.map(conv => `
            <div class="user-card" onclick="viewAdminConversation('${conv.id}', '${escapeHtml(conv.title || 'Untitled')}')" style="cursor:pointer;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div style="width:36px;height:36px;border-radius:50%;background:${conv.color || '#2a7f7f'};display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;">${(conv.title || 'C')[0]}</div>
                    <div style="flex:1;">
                        <h4>${escapeHtml(conv.title || 'Untitled')}</h4>
                        <p style="font-size:12px;color:var(--text-tertiary);">${conv.message_count || 0} messages • ${new Date(conv.created_at).toLocaleDateString()}</p>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (e) { document.getElementById('adminUserChats').innerHTML = '<p class="error">Failed to load conversations</p>'; }
}

async function viewAdminConversation(convId, title) {
    try {
        const res = await fetch(`${API_BASE}/api/admin/conversations/${convId}/messages`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        const container = document.getElementById('adminChatView');
        const msgContainer = document.getElementById('adminMessagesContainer');
        document.getElementById('adminChatViewTitle').textContent = title || 'Conversation';
        document.getElementById('adminChatViewMeta').textContent = `${data.messages ? data.messages.length : 0} messages`;
        msgContainer.innerHTML = '';
        if (!data.messages || data.messages.length === 0) {
            msgContainer.innerHTML = '<p style="color:var(--text-tertiary);text-align:center;">No messages in this conversation.</p>';
        } else {
            data.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.role}`;
                div.style.maxWidth = '90%';
                div.innerHTML = formatMessageHTML(msg.role, msg.content);
                msgContainer.appendChild(div);
            });
        }
        // Switch tabs
        document.querySelectorAll('.admin-content').forEach(el => el.classList.add('hidden'));
        document.getElementById('adminChatView').classList.remove('hidden');
        document.querySelectorAll('.admin-tab').forEach(el => el.classList.remove('active'));
    } catch (e) {
        document.getElementById('adminMessagesContainer').innerHTML = '<p class="error">Failed to load messages.</p>';
    }
}

function backToUserChats() {
    document.getElementById('adminChatView').classList.add('hidden');
    document.getElementById('adminUserChats').classList.remove('hidden');
    document.getElementById('adminTabChats').classList.add('active');
}

async function loadAdminSystemPrompts() {
    document.getElementById('adminPrompts').innerHTML = '<p style="color:var(--text-tertiary)">System prompts management coming soon</p>';
}

async function loadRoadmaps() {
    document.getElementById('adminRoadmaps').innerHTML = '<p style="color:var(--text-tertiary)">Roadmaps coming soon</p>';
}

async function loadMetrics() {
    document.getElementById('adminMetrics').innerHTML = '<p style="color:var(--text-tertiary)">Metrics coming soon</p>';
}
