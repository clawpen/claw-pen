<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Pen - Agent Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --success: #22c55e;
            --warning: #fbbf24;
            --danger: #ef4444;
            --text-primary: #f0f0f0;
            --text-secondary: #94a3b8;
            --border: #0f3460;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
        }
        .sidebar { width: 280px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 8px; }
        .agent-list { flex: 1; overflow-y: auto; padding: 10px; }
        .agent-card { background: var(--bg-tertiary); border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; border: 2px solid transparent; }
        .agent-card:hover { border-color: var(--accent); }
        .agent-card.active { border-color: var(--accent); background: rgba(233, 69, 96, 0.1); }
        .agent-card .name { font-weight: 600; margin-bottom: 4px; }
        .agent-card .status { font-size: 0.8rem; color: var(--text-secondary); }
        .agent-card .status.running { color: var(--success); }
        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border); }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .main { flex: 1; display: flex; flex-direction: column; }
        .main-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .agent-info { display: flex; align-items: center; gap: 12px; }
        .agent-info .emoji { font-size: 2rem; }
        .agent-info h2 { font-size: 1.2rem; }
        .agent-info .model { font-size: 0.8rem; color: var(--text-secondary); }
        .connection-status { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--text-secondary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }
        .status-dot.connected { background: var(--success); }
        .status-dot.connecting { background: var(--warning); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .message { max-width: 80%; margin-bottom: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { margin-left: auto; }
        .message-bubble { padding: 12px 16px; border-radius: 16px; line-height: 1.5; }
        .message.user .message-bubble { background: var(--accent); border-bottom-right-radius: 4px; }
        .message.agent .message-bubble { background: var(--bg-tertiary); border-bottom-left-radius: 4px; }
        .message .time { font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px; }
        .message.user .time { text-align: right; }
        .input-area { padding: 15px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .input-area textarea { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text-primary); font-size: 0.95rem; resize: none; font-family: inherit; }
        .input-area textarea:focus { outline: none; border-color: var(--accent); }
        .input-area .send-btn { width: 50px; height: 50px; border-radius: 12px; background: var(--accent); border: none; color: white; cursor: pointer; font-size: 1.2rem; }
        .input-area .send-btn:hover { background: var(--accent-hover); }
        .input-area .send-btn:disabled { background: var(--bg-tertiary); cursor: not-allowed; }
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); }
        .empty-state .emoji { font-size: 4rem; margin-bottom: 20px; }
        .empty-state h3 { margin-bottom: 10px; color: var(--text-primary); }
        .typing-indicator { padding: 12px 16px; background: var(--bg-tertiary); border-radius: 16px; border-bottom-left-radius: 4px; display: none; gap: 4px; max-width: 60px; }
        .typing-indicator.visible { display: flex; }
        .typing-indicator span { width: 8px; height: 8px; background: var(--text-secondary); border-radius: 50%; animation: typing 1.4s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><h1><span>🦞</span> Claw Pen</h1></div>
        <div class="agent-list" id="agentList">
            <div class="agent-card active">
                <div class="name">Tutor Box</div>
                <div class="status running">running</div>
            </div>
        </div>
        <div class="sidebar-footer">
            <button class="btn btn-primary" onclick="refreshAgents()">↻ Refresh</button>
        </div>
    </div>

    <div class="main">
        <div class="main-header">
            <div class="agent-info">
                <span class="emoji">📚</span>
                <div>
                    <h2>Tutor Box</h2>
                    <div class="model">zai/glm-5</div>
                </div>
            </div>
            <div class="connection-status">
                <span class="status-dot connecting" id="statusDot"></span>
                <span id="statusText">Connecting...</span>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <div class="emoji">📚</div>
                <h3>Tutor Box</h3>
                <p>Learn anything with adaptive teaching</p>
                <p style="margin-top: 10px; font-size: 0.9rem;">Send a message to start learning!</p>
            </div>
            <div class="typing-indicator" id="typingIndicator"><span></span><span></span><span></span></div>
        </div>

        <div class="input-area">
            <textarea id="messageInput" placeholder="Ask me anything..." rows="1" onkeydown="handleKeydown(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;
        const { listen } = window.__TAURI__.event;
        
        let connected = false;
        let pendingReply = false;

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('[UI] DOM loaded');
            autoResizeTextarea();
            
            // Listen for WebSocket connection status
            await listen('ws-connected', (event) => {
                connected = event.payload;
                updateStatus(connected ? 'connected' : 'disconnected');
                console.log('[UI] WebSocket connected:', connected);
            });
            
            // Listen for incoming messages
            await listen('ws-message', (event) => {
                console.log('[UI] Got message:', event.payload.substring(0, 100));
                const data = JSON.parse(event.payload);
                handleWebSocketMessage(data);
            });
            
            // Connect via Rust WebSocket - use 127.0.0.1
            console.log('[UI] Invoking connect_websocket');
            try {
                await invoke('connect_websocket', { url: 'ws://127.0.0.1:18790/ws' });
                console.log('[UI] connect_websocket returned');
            } catch (e) {
                console.error('[UI] connect_websocket error:', e);
                updateStatus('disconnected');
            }
        });

        function autoResizeTextarea() {
            const textarea = document.getElementById('messageInput');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 150) + 'px';
            });
        }

        function handleWebSocketMessage(data) {
            console.log('[UI] Message type:', data.type, data.event || '');

            if (data.type === 'event' && data.event === 'connect.challenge') {
                console.log('[UI] Got challenge, sending auth');
                sendRawMessage({ type: 'auth', method: 'none' });
                return;
            }

            if (data.type === 'event' && data.event === 'auth.success') {
                console.log('[UI] Auth successful');
                return;
            }

            if (data.type === 'agent-reply' || data.type === 'reply') {
                const content = data.content || data.text || data.message;
                if (content) addMessage(content, 'agent');
                pendingReply = false;
                document.getElementById('typingIndicator').classList.remove('visible');
                document.getElementById('sendBtn').disabled = false;
                return;
            }

            if (data.type === 'error') {
                console.error('[UI] Agent error:', data.message || data.error);
                pendingReply = false;
                document.getElementById('typingIndicator').classList.remove('visible');
                document.getElementById('sendBtn').disabled = false;
                return;
            }
        }

        function updateStatus(status) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            dot.className = 'status-dot';
            if (status === 'connected') { dot.classList.add('connected'); text.textContent = 'Connected'; }
            else if (status === 'connecting') { dot.classList.add('connecting'); text.textContent = 'Connecting...'; }
            else { text.textContent = 'Disconnected'; }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || pendingReply) return;

            addMessage(text, 'user');
            input.value = '';
            input.style.height = 'auto';
            document.getElementById('typingIndicator').classList.add('visible');
            pendingReply = true;
            document.getElementById('sendBtn').disabled = true;

            try {
                await invoke('send_chat_message', { text: text });
            } catch (e) {
                console.error('[UI] Send failed:', e);
                document.getElementById('typingIndicator').classList.remove('visible');
                pendingReply = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        async function sendRawMessage(msg) {
            try {
                const text = typeof msg === 'string' ? msg : JSON.stringify(msg);
                await invoke('send_chat_message', { text: text });
            } catch (e) {
                console.error('[UI] Send raw failed:', e);
            }
        }

        function addMessage(text, sender) {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('typingIndicator').classList.remove('visible');
            const container = document.getElementById('chatContainer');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div><div class="time">${time}</div>`;
            container.insertBefore(div, document.getElementById('typingIndicator'));
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        function handleKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }
        }

        async function refreshAgents() {
            try {
                const agents = await invoke('list_agents');
                console.log('[UI] Agents:', agents);
            } catch (e) {
                console.error('[UI] Failed to list agents:', e);
            }
        }
    </script>
</body>
</html>
