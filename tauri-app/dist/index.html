<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Pen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a; 
            color: #e0e0e0; 
            height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 280px;
            background: #16162a;
            border-right: 1px solid #2a2a4a;
            padding: 1rem;
            overflow-y: auto;
        }
        .sidebar h1 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        .agent-card {
            background: #1e1e3a;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .agent-card:hover { border-color: #3a3a6a; }
        .agent-card.active { border-color: #e94560; }
        .agent-name { font-weight: 600; margin-bottom: 0.25rem; }
        .agent-status { font-size: 0.8rem; color: #888; }
        .agent-status.running { color: #22c55e; }
        .agent-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.25rem;
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.5rem;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 1rem;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .header h2 { font-size: 1rem; }
        .status-badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            background: #2a2a4a;
        }
        .status-badge.connected { background: #22c55e33; color: #4ade80; }
        .status-badge.connecting { background: #fbbf2433; color: #fbbf24; }
        .status-badge.disconnected { background: #ef444433; color: #ef4444; }
        .messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .msg {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
        }
        .msg.user { align-self: flex-end; background: #e94560; }
        .msg.assistant { align-self: flex-start; background: #1e1e3a; }
        .msg-role { font-size: 0.7rem; opacity: 0.7; margin-bottom: 0.2rem; }
        .msg-text { white-space: pre-wrap; }
        .input-area {
            padding: 1rem;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 0.5rem;
        }
        .input-area textarea {
            flex: 1;
            background: #1e1e3a;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            color: #e0e0e0;
            font-family: inherit;
            resize: none;
        }
        .input-area textarea:focus { outline: none; }
        .btn {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-send { background: #e94560; color: white; }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
        .empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .login-box {
            background: #16162a;
            padding: 2rem;
            border-radius: 16px;
            width: 350px;
        }
        .login-box h2 { text-align: center; margin-bottom: 0.5rem; }
        .login-box p { text-align: center; color: #888; margin-bottom: 1rem; }
        .login-box input {
            width: 100%;
            padding: 0.75rem;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            margin-bottom: 1rem;
        }
        .login-box input:focus { outline: none; border-color: #e94560; }
        .login-box .btn { width: 100%; background: #e94560; color: white; }
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>🦀 Claw Pen</h1>
        <div id="agents"></div>
    </div>
    <div class="main">
        <div class="header">
            <h2 id="title">Select an agent</h2>
            <span class="status-badge disconnected" id="status">Disconnected</span>
        </div>
        <div class="messages" id="messages">
            <div class="empty">Select an agent to start chatting</div>
        </div>
        <div class="input-area" id="input-area" style="display:none">
            <textarea id="input" placeholder="Type a message..." rows="2"></textarea>
            <button class="btn btn-send" id="send-btn">Send</button>
        </div>
    </div>
    <div class="login-overlay" id="login" style="display:none">
        <div class="login-box">
            <h2>🦀 Claw Pen</h2>
            <p>Enter password</p>
            <div class="error-msg" id="login-err" style="display:none"></div>
            <input type="password" id="pwd" placeholder="Password">
            <button class="btn" id="login-btn">Login</button>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8081';
        var agents = [];
        var active = null;
        var msgs = [];
        var connected = false;
        var authed = false;
        var hasTauri = typeof window.__TAURI__ !== 'undefined';

        // DOM refs
        var agentsEl = document.getElementById('agents');
        var titleEl = document.getElementById('title');
        var statusEl = document.getElementById('status');
        var messagesEl = document.getElementById('messages');
        var inputAreaEl = document.getElementById('input-area');
        var inputEl = document.getElementById('input');
        var sendBtn = document.getElementById('send-btn');
        var loginEl = document.getElementById('login');
        var pwdEl = document.getElementById('pwd');
        var loginBtn = document.getElementById('login-btn');
        var loginErrEl = document.getElementById('login-err');

        // Init
        async function init() {
            try {
                var s = await fetch(API + '/auth/status').then(function(r) { return r.json(); });
                if (s.auth_enabled && !localStorage.getItem('token')) {
                    loginEl.style.display = 'flex';
                    return;
                }
            } catch(e) {}
            await loadAgents();
            if (hasTauri) setupEvents();
        }

        loginBtn.onclick = async function() {
            var pwd = pwdEl.value;
            try {
                var r = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: pwd})
                });
                if (r.ok) {
                    var d = await r.json();
                    localStorage.setItem('token', d.access_token);
                    loginEl.style.display = 'none';
                    await loadAgents();
                    if (hasTauri) setupEvents();
                } else {
                    loginErrEl.textContent = 'Invalid password';
                    loginErrEl.style.display = 'block';
                }
            } catch(e) {
                loginErrEl.textContent = 'Connection failed';
                loginErrEl.style.display = 'block';
            }
        };

        pwdEl.onkeydown = function(e) {
            if (e.key === 'Enter') loginBtn.click();
        };

        async function loadAgents() {
            var t = localStorage.getItem('token');
            var h = t ? {'Authorization': 'Bearer ' + t} : {};
            try {
                var r = await fetch(API + '/api/agents', {headers: h});
                if (r.ok) {
                    agents = await r.json();
                    renderAgents();
                }
            } catch(e) {}
        }

        function renderAgents() {
            if (!agents.length) {
                agentsEl.innerHTML = '<div style="color:#666;padding:1rem;text-align:center">No agents</div>';
                return;
            }
            var html = '';
            for (var i = 0; i < agents.length; i++) {
                var a = agents[i];
                var prov = (a.config && a.config.llm_provider) || 'unknown';
                var model = (a.config && a.config.llm_model) || 'default';
                var ram = (a.config && a.config.memory_mb) || 1024;
                var cpu = (a.config && a.config.cpu_cores) || 1;
                var isActive = active && active.id === a.id;
                html += '<div class="agent-card ' + (isActive ? 'active' : '') + '" data-idx="' + i + '">' +
                    '<div class="agent-name">' + esc(a.name) + '</div>' +
                    '<div class="agent-status ' + a.status.toLowerCase() + '">' + a.status + '</div>' +
                    '<div class="agent-meta">' +
                        '<span>🤖 ' + prov + '</span>' +
                        '<span>🧠 ' + cut(model, 10) + '</span>' +
                        '<span>💾 ' + (ram >= 1024 ? (ram/1024).toFixed(1) + 'G' : ram + 'M') + '</span>' +
                        '<span>⚡ ' + cpu + 'c</span>' +
                    '</div>' +
                '</div>';
            }
            agentsEl.innerHTML = html;
            
            // Add click handlers
            var cards = agentsEl.querySelectorAll('.agent-card');
            for (var j = 0; j < cards.length; j++) {
                cards[j].onclick = function() {
                    var idx = parseInt(this.getAttribute('data-idx'));
                    selectAgent(agents[idx]);
                };
            }
        }

        function esc(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function cut(s, n) {
            return s.length > n ? s.slice(0, n-2) + '..' : s;
        }

        async function selectAgent(a) {
            active = a;
            msgs = [];
            renderAgents();
            renderMessages();
            titleEl.textContent = a.name;
            inputAreaEl.style.display = 'flex';
            
            if (!hasTauri) return;
            
            setStatus('connecting');
            var port = (a.config && a.config.env_vars && a.config.env_vars.PORT) || 18790;
            try {
                await window.__TAURI__.core.invoke('connect_websocket', {url: 'ws://localhost:' + port + '/ws'});
            } catch(e) {
                setStatus('disconnected');
            }
        }

        async function setupEvents() {
            await window.__TAURI__.event.listen('ws-connected', function(e) {
                connected = e.payload;
                setStatus(connected ? 'connecting' : 'disconnected');
            });
            await window.__TAURI__.event.listen('ws-authenticated', function(e) {
                authed = e.payload;
                setStatus(authed ? 'connected' : 'disconnected');
                renderMessages();
            });
            await window.__TAURI__.event.listen('ws-message', function(e) {
                handleMsg(e.payload);
            });
            await window.__TAURI__.event.listen('ws-error', function(e) {
                console.log('Error:', e.payload);
                setStatus('disconnected');
            });
        }

        function setStatus(s) {
            statusEl.className = 'status-badge ' + s;
            statusEl.textContent = s === 'connected' ? 'Connected' : s === 'connecting' ? 'Connecting...' : 'Disconnected';
        }

        function handleMsg(d) {
            if (!d) return;
            var m = d;
            if (typeof d === 'string') {
                try { m = JSON.parse(d); } catch(e) { return; }
            }
            
            // Agent stream content
            if (m.event === 'agent' && m.payload) {
                var p = m.payload;
                if (p.stream === 'content' && p.data) {
                    var txt = p.data.delta || p.data.content || '';
                    if (txt) {
                        var last = msgs.length > 0 ? msgs[msgs.length - 1] : null;
                        if (last && last.role === 'assistant' && !last.done) {
                            last.text = last.text + txt;
                        } else {
                            msgs.push({role: 'assistant', text: txt, done: false});
                        }
                        renderMessages();
                    }
                } else if (p.stream === 'lifecycle' && p.data) {
                    if (p.data.phase === 'end' || p.data.phase === 'error') {
                        var last2 = msgs.length > 0 ? msgs[msgs.length - 1] : null;
                        if (last2) last2.done = true;
                        if (p.data.phase === 'error' && p.data.error) {
                            msgs.push({role: 'assistant', text: '⚠️ ' + p.data.error, done: true});
                            renderMessages();
                        }
                    }
                }
                return;
            }
            
            // Chat message
            if (m.event === 'chat.message' && m.params && m.params.content) {
                msgs.push({role: m.params.role || 'assistant', text: m.params.content, done: true});
                renderMessages();
                return;
            }
            
            // Response with content
            if (m.result && m.result.content) {
                msgs.push({role: m.result.role || 'assistant', text: m.result.content, done: true});
                renderMessages();
            }
        }

        function renderMessages() {
            if (!msgs.length) {
                messagesEl.innerHTML = '<div class="empty">Start a conversation</div>';
                return;
            }
            var html = '';
            for (var i = 0; i < msgs.length; i++) {
                var msg = msgs[i];
                html += '<div class="msg ' + msg.role + '">' +
                    '<div class="msg-role">' + (msg.role === 'user' ? 'You' : (active ? active.name : 'Agent')) + '</div>' +
                    '<div class="msg-text">' + esc(msg.text) + '</div>' +
                '</div>';
            }
            messagesEl.innerHTML = html;
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        sendBtn.onclick = async function() {
            var txt = inputEl.value.trim();
            if (!txt || !authed || !hasTauri) return;
            
            msgs.push({role: 'user', text: txt, done: true});
            renderMessages();
            inputEl.value = '';
            
            try {
                await window.__TAURI__.core.invoke('send_chat_message', {text: txt});
            } catch(e) {
                console.log('Send error:', e);
            }
        };

        inputEl.onkeydown = function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        };

        setInterval(loadAgents, 30000);
        init();
    </script>
</body>
</html>
