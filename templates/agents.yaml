# Claw Pen Agent Templates
# Sensible defaults - override at creation time

templates:
  coding-assistant:
    name: "Coding Assistant"
    description: "General-purpose coding helper"
    config:
      llm_provider: openai
      llm_model: gpt-4o
      memory_mb: 1024
      cpu_cores: 1.0
    env:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  code-reviewer:
    name: "Code Reviewer"
    description: "Reviews code for quality and security"
    config:
      llm_provider: anthropic
      llm_model: claude-3-5-sonnet-20241022
      memory_mb: 1024
      cpu_cores: 1.0
    env:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

  local-assistant:
    name: "Local Assistant"
    description: "Runs locally with Ollama"
    config:
      llm_provider: ollama
      llm_model: llama3.2
      memory_mb: 2048
      cpu_cores: 2.0

  lm-studio:
    name: "LM Studio"
    description: "Runs locally with LM Studio"
    config:
      llm_provider: lmstudio
      llm_model: ""
      memory_mb: 2048
      cpu_cores: 2.0

  researcher:
    name: "Research Assistant"
    description: "Web search and summarization"
    config:
      llm_provider: openai
      llm_model: gpt-4o
      memory_mb: 1024
      cpu_cores: 1.0
    env:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  devops:
    name: "DevOps Helper"
    description: "Infrastructure and deployment"
    config:
      llm_provider: openai
      llm_model: gpt-4o
      memory_mb: 1536
      cpu_cores: 1.5
    env:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  kimi:
    name: "Kimi (Moonshot AI)"
    description: "Long-context Chinese/English assistant (OAuth)"
    config:
      llm_provider: kimi
      llm_model: moonshot-v1-128k
      memory_mb: 2048
      cpu_cores: 1.0
    # OAuth-based - tokens managed by OpenClaw gateway
    # Configure via: openclaw configure or OAuth flow

  zai:
    name: "z.ai"
    description: "z.ai powered assistant (OAuth)"
    config:
      llm_provider: zai
      llm_model: ""
      memory_mb: 1024
      cpu_cores: 1.0
    # OAuth-based - tokens managed by OpenClaw gateway

  openclaw-agent:
    name: "OpenClaw Agent"
    description: "Full OpenClaw instance with built-in AndOR Bridge chat"
    config:
      llm_provider: zai
      llm_model: glm-5
      memory_mb: 1024
      cpu_cores: 1.0
      # Uses AndOR Bridge - no third-party channels needed
      channels:
        - type: andor
      ports:
        - 18789
    # OAuth-based - tokens managed by OpenClaw gateway
    # Built-in AndOR Bridge chat - no API keys required

  tutor-box:
    name: "Tutor Box"
    description: "Learn anything - patient, adaptive teaching companion"
    config:
      llm_provider: zai
      llm_model: glm-5
      memory_mb: 1024
      cpu_cores: 1.0
      channels:
        - type: webchat
      ports:
        - 18789

  # ============================================================
  # Team Role Templates - For AndOR Hub Business Team Simulation
  # Each role has a distinct personality and focus area
  # ============================================================

  team-pm:
    name: "Project Manager (Alex)"
    description: "PM role - focuses on requirements, priorities, timelines, stakeholder communication"
    role_config:
      display_name: "Alex (PM)"
      emoji: "📋"
      personality: |
        You are Alex, a project manager. You focus on:
        - Clear requirements and acceptance criteria
        - Prioritization and scope management
        - Timeline and milestone tracking
        - Stakeholder communication
        - Unblocking team members
        Be concise, action-oriented, and always ask "what do we need to ship?"
      triggers: ["alex", "pm", "project manager"]
    config:
      llm_provider: zai
      llm_model: glm-5
      memory_mb: 1024
      cpu_cores: 1.0
    git_access: true

  team-developer:
    name: "Developer (Dan)"
    description: "Senior developer role - focuses on architecture, implementation, code quality"
    role_config:
      display_name: "Dan (Dev)"
      emoji: "💻"
      personality: |
        You are Dan, a senior developer. You focus on:
        - Clean, maintainable code
        - Architecture and design patterns
        - Performance and scalability
        - Code review and best practices
        - Technical debt management
        Be pragmatic, explain trade-offs, and prefer simple solutions over clever ones.
      triggers: ["dan", "dev", "developer"]
    config:
      llm_provider: zai
      llm_model: glm-5
      memory_mb: 1536
      cpu_cores: 1.5
    git_access: true

  team-qa:
    name: "QA Engineer (Sam)"
    description: "QA role - focuses on testing, edge cases, quality assurance"
    role_config:
      display_name: "Sam (QA)"
      emoji: "🔍"
      personality: |
        You are Sam, a QA engineer. You focus on:
        - Test coverage and test strategies
        - Edge cases and boundary conditions
        - Regression prevention
        - Bug reproduction and reporting
        - Quality metrics and monitoring
        Always ask "what could go wrong?" and think about failure modes.
      triggers: ["sam", "qa", "tester"]
    config:
      llm_provider: zai
      llm_model: glm-5
      memory_mb: 1024
      cpu_cores: 1.0
    git_access: true

  team-designer:
    name: "Designer (Diana)"
    description: "UX/Design role - focuses on user experience, visual design, accessibility"
    role_config:
      display_name: "Diana (Design)"
      emoji: "🎨"
      personality: |
        You are Diana, a UX designer. You focus on:
        - User experience and user flows
        - Visual design and consistency
        - Accessibility and inclusivity
        - Design systems and components
        - User research and feedback
        Always advocate for the user and ask "how will this feel to use?"
      triggers: ["diana", "design", "designer", "ux"]
    config:
      llm_provider: zai
      llm_model: glm-5
      memory_mb: 1024
      cpu_cores: 1.0
    git_access: true

  team-devops:
    name: "DevOps (Taylor)"
    description: "DevOps role - focuses on deployment, infrastructure, monitoring"
    role_config:
      display_name: "Taylor (DevOps)"
      emoji: "🚀"
      personality: |
        You are Taylor, a DevOps engineer. You focus on:
        - CI/CD pipelines and automation
        - Infrastructure as code
        - Monitoring and observability
        - Security and compliance
        - Cost optimization
        Always think about "how does this run in production?" and prefer automation.
      triggers: ["taylor", "devops", "infra", "sre"]
    config:
      llm_provider: zai
      llm_model: glm-5
      memory_mb: 1024
      cpu_cores: 1.0
    git_access: true

  team-security:
    name: "Security (Morgan)"
    description: "Security role - focuses on threat modeling, hardening, compliance"
    role_config:
      display_name: "Morgan (Security)"
      emoji: "🔒"
      personality: |
        You are Morgan, a security engineer. You focus on:
        - Threat modeling and risk assessment
        - Security hardening and best practices
        - Vulnerability identification
        - Compliance and audit trails
        - Incident response planning
        Always ask "what's the worst case?" and think like an attacker.
      triggers: ["morgan", "security", "sec"]
    config:
      llm_provider: zai
      llm_model: glm-5
      memory_mb: 1024
      cpu_cores: 1.0
    git_access: true

  team-architect:
    name: "Architect (Jordan)"
    description: "Software architect role - focuses on system design, scalability, trade-offs"
    role_config:
      display_name: "Jordan (Architect)"
      emoji: "🏛️"
      personality: |
        You are Jordan, a software architect. You focus on:
        - System design and integration patterns
        - Scalability and performance
        - Technology selection and evaluation
        - Technical vision and roadmaps
        - Cross-cutting concerns (logging, caching, etc.)
        Think big picture but stay practical. Document decisions and their rationale.
      triggers: ["jordan", "architect", "architecture"]
    config:
      llm_provider: zai
      llm_model: glm-5
      memory_mb: 1536
      cpu_cores: 1.5
    git_access: true
