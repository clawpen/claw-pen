name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build runtime
        run: cd runtime && cargo build --verbose

      - name: Build orchestrator
        run: cd orchestrator && cargo build --verbose

      - name: Build UI
        run: cd ui && cargo build --verbose

      - name: Test orchestrator
        run: cd orchestrator && cargo test --verbose

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy orchestrator
        run: cd orchestrator && cargo clippy --all-targets --all-features -- -D warnings

      - name: Clippy runtime
        run: cd runtime && cargo clippy --all-targets --all-features -- -D warnings

      - name: Clippy UI
        run: cd ui && cargo clippy --all-targets --all-features -- -D warnings
