<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Pen - Agent Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        
        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 1rem;
        }
        
        .header h1 {
            font-size: 1.8rem;
            color: #f0f0f0;
        }

        .nav {
            display: flex;
            gap: 0.5rem;
        }

        .nav-link {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #333;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: #333;
            color: #fff;
        }

        .nav-link.active {
            background: #e94560;
            color: white;
            border-color: #e94560;
        }

        .btn-logout {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #333;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .btn-logout:hover {
            background: #333;
            color: #fff;
        }
        
        .toolbar {
            margin-bottom: 1.5rem;
        }
        
        .btn-primary {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        
        .btn-primary:hover {
            background: #ff6b6b;
        }
        
        .btn-primary:disabled {
            background: #4a4a5e;
            cursor: not-allowed;
        }
        
        /* Login Styles */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .login-box {
            background: #16213e;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid #0f3460;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .login-box h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .login-box h2 {
            text-align: center;
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }
        
        .setup-message {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .setup-message h2 {
            color: #e94560;
            margin-bottom: 0.5rem;
        }
        
        .setup-message p {
            color: #94a3b8;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        .form-group input::placeholder {
            color: #6b7280;
        }
        
        .error-message {
            background: #7f1d1d;
            color: #fecaca;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .loading {
            text-align: center;
            color: #94a3b8;
            padding: 2rem;
        }
        
        /* Agent Grid Styles */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        
        .agent-card {
            background: #16213e;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #0f3460;
        }
        
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .agent-header h3 {
            font-size: 1.2rem;
        }
        
        .status-running { color: #4ade80; }
        .status-stopped { color: #94a3b8; }
        .status-starting, .status-stopping { color: #fbbf24; }
        .status-error { color: #ef4444; }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #1a1a2e;
        }
        
        .info-row .label {
            color: #94a3b8;
        }
        
        .info-row .value.local {
            color: #22c55e;
        }
        
        .info-row .value.local::after {
            content: " ⚡";
        }
        
        .agent-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        
        .agent-actions button {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .btn-start {
            background: #22c55e;
            color: white;
        }
        
        .btn-stop {
            background: #ef4444;
            color: white;
        }
        
        .btn-chat {
            background: #3b82f6;
            color: white;
        }
        
        .btn-config {
            background: #6b7280;
            color: white;
        }
        
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        /* Teams Styles */
        .teams-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .team-roles {
            margin-top: 1rem;
        }

        .grid {
            display: grid;
        }

        .grid-cols-1 {
            grid-template-columns: repeat(1, minmax(0, 1fr));
        }

        @media (min-width: 768px) {
            .md\:grid-cols-2 {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 1024px) {
            .lg\:grid-cols-3 {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        .space-y-1 > * + * {
            margin-top: 0.25rem;
        }

        .space-y-2 > * + * {
            margin-top: 0.5rem;
        }

        .space-x-2 > * + * {
            margin-left: 0.5rem;
        }

        .flex-wrap {
            flex-wrap: wrap;
        }

        /* Side Panel Dashboard Styles */
        .dashboard-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #0f3460;
        }

        .sidebar-header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #f0f0f0;
        }

        .agent-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .agent-card {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .agent-card:hover {
            border-color: #e94560;
        }

        .agent-card.active {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .agent-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .agent-card-header .name {
            font-weight: 600;
            font-size: 1rem;
        }

        .agent-card-header .status {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: lowercase;
        }

        .agent-card-header .status.running {
            color: #22c55e;
        }

        .agent-card-header .status.stopped {
            color: #94a3b8;
        }

        .agent-card-header .status.starting,
        .agent-card-header .status.stopping {
            color: #fbbf24;
        }

        .agent-card-header .status.error {
            color: #ef4444;
        }

        .agent-card-actions {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            background: #0f3460;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #e94560;
        }

        .action-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-btn.disabled:hover {
            background: #0f3460;
        }

        .sidebar-footer {
            padding: 15px;
            border-top: 1px solid #0f3460;
        }

        .btn-refresh {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #e94560;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-refresh:hover {
            background: #ff6b6b;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f1a;
        }

        .empty-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }

        .empty-main .emoji {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-main h2 {
            margin-bottom: 10px;
            color: #f0f0f0;
        }

        .loading-state {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #16213e;
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid #0f3460;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            color: #f0f0f0;
        }

        .modal-close {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 2rem;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #f0f0f0;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .modal-body .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .modal-body .form-group label {
            font-weight: 500;
            color: #f0f0f0;
        }

        .modal-body .form-group select {
            padding: 0.75rem;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
        }

        .modal-body .form-group select:focus {
            outline: none;
            border-color: #e94560;
        }

        .modal-body .form-group select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            flex: 1;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .success-message {
            background: #065f46;
            color: #d1fae5;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .info-message {
            background: #1e3a8a;
            color: #dbeafe;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .current-assignments {
            margin-top: 1rem;
            padding: 1rem;
            background: #1a1a2e;
            border-radius: 8px;
            border: 1px solid #0f3460;
        }

        .current-assignments h4 {
            margin-bottom: 0.5rem;
            color: #f0f0f0;
        }

        .current-assignments ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .current-assignments li {
            padding: 0.5rem;
            border-bottom: 1px solid #0f3460;
        }

        .current-assignments li:last-child {
            border-bottom: none;
        }

        .current-assignments li.current-agent {
            background: rgba(233, 69, 96, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <script type="module">
        import init from './wasm.js';
        init();
    </script>
</body>
</html>
