<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Pen - Agent Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        
        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 1rem;
        }
        
        .header h1 {
            font-size: 1.8rem;
            color: #f0f0f0;
        }
        
        .btn-logout {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #333;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .btn-logout:hover {
            background: #333;
            color: #fff;
        }
        
        .toolbar {
            margin-bottom: 1.5rem;
        }
        
        .btn-primary {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        
        .btn-primary:hover {
            background: #ff6b6b;
        }
        
        .btn-primary:disabled {
            background: #4a4a5e;
            cursor: not-allowed;
        }
        
        /* Login Styles */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .login-box {
            background: #16213e;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid #0f3460;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .login-box h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .login-box h2 {
            text-align: center;
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }
        
        .setup-message {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .setup-message h2 {
            color: #e94560;
            margin-bottom: 0.5rem;
        }
        
        .setup-message p {
            color: #94a3b8;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        .form-group input::placeholder {
            color: #6b7280;
        }
        
        .error-message {
            background: #7f1d1d;
            color: #fecaca;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .loading {
            text-align: center;
            color: #94a3b8;
            padding: 2rem;
        }
        
        /* Agent Grid Styles */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        
        .agent-card {
            background: #16213e;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #0f3460;
        }
        
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .agent-header h3 {
            font-size: 1.2rem;
        }
        
        .status-running { color: #4ade80; }
        .status-stopped { color: #94a3b8; }
        .status-starting, .status-stopping { color: #fbbf24; }
        .status-error { color: #ef4444; }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #1a1a2e;
        }
        
        .info-row .label {
            color: #94a3b8;
        }
        
        .info-row .value.local {
            color: #22c55e;
        }
        
        .info-row .value.local::after {
            content: " ⚡";
        }
        
        .agent-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        
        .agent-actions button {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .btn-start {
            background: #22c55e;
            color: white;
        }
        
        .btn-stop {
            background: #ef4444;
            color: white;
        }
        
        .btn-chat {
            background: #3b82f6;
            color: white;
        }
        
        .btn-config {
            background: #6b7280;
            color: white;
        }
        
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        /* Settings Button */
        .btn-settings {
            background: transparent;
            border: 1px solid #333;
            color: #94a3b8;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: 0.5rem;
        }
        
        .btn-settings:hover {
            background: #333;
            color: #fff;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal {
            background: #16213e;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #0f3460;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #0f3460;
        }
        
        .modal-header h2 {
            font-size: 1.25rem;
        }
        
        .btn-close {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        
        .btn-close:hover {
            color: #fff;
        }
        
        .modal-body {
            padding: 1.5rem;
        }
        
        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #0f3460;
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
        
        /* Settings Sections */
        .settings-section {
            margin-bottom: 2rem;
        }
        
        .settings-section:last-child {
            margin-bottom: 0;
        }
        
        .settings-section h3 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
            color: #f0f0f0;
        }
        
        .settings-description {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        
        /* Mode Toggle */
        .mode-toggle {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 1rem;
        }
        
        .toggle-option {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            cursor: pointer;
        }
        
        .toggle-option input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            accent-color: #e94560;
        }
        
        .toggle-label {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .toggle-label strong {
            color: #f0f0f0;
        }
        
        .toggle-desc {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        
        .mode-info {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }
        
        .mode-badge {
            padding: 0.25rem 0.75rem;
            background: #333;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        
        .mode-badge.active {
            background: #22c55e;
            color: #fff;
        }
        
        .current-mode {
            font-size: 0.875rem;
            color: #94a3b8;
            margin: 0;
        }
        
        .current-mode strong {
            color: #4ade80;
        }
        
        .mode-desc {
            display: block;
            margin-top: 0.25rem;
            font-size: 0.8rem;
        }
        
        /* Roles Grid */
        .roles-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }
        
        .role-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: #1a1a2e;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .role-checkbox:hover {
            background: #222;
        }
        
        .role-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #e94560;
        }
        
        .role-checkbox span {
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <script type="module">
        import init from './wasm.js';
        init();
    </script>
</body>
</html>
