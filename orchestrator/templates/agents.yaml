templates:
  openclaw-agent:
    name: openclaw-agent
    description: "Full OpenClaw instance with built-in AndOR Bridge chat"
    config:
      llm_provider: zai
      llm_model: glm-5
      memory_mb: 1024
      cpu_cores: 1.0
    env:
      PORT: "18789"
  
  tutor-box:
    name: tutor-box
    description: "Learning companion - learn anything with personalized tutoring"
    config:
      llm_provider: zai
      llm_model: glm-5
      memory_mb: 1024
      cpu_cores: 1.0
    env:
      PORT: "18790"
